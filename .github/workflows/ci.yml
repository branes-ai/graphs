name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

jobs:
  # Job 1: Package Installation Check
  package-check:
    name: Package Installation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install package
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -e .

      - name: Verify imports
        run: |
          python -c "from graphs.ir.structures import TensorDescriptor; print('✓ IR structures')"
          python -c "from graphs.transform.partitioning import GraphPartitioner; print('✓ Graph partitioner')"
          python -c "from graphs.transform.partitioning import FusionBasedPartitioner; print('✓ Fusion partitioner')"
          python -c "from graphs.analysis.concurrency import ConcurrencyAnalyzer; print('✓ Concurrency analysis')"
          python -c "from graphs.hardware.resource_model import HardwareResourceModel; print('✓ Hardware models')"
          python -c "from graphs.hardware.mappers.cpu import CPUMapper; print('✓ CPU mapper')"
          python -c "from graphs.hardware.mappers.gpu import GPUMapper; print('✓ GPU mapper')"
          echo "✅ All core imports successful"

  # Job 2: Unit Tests (Multiple Python Versions)
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    # Required by graphs.hardware.physical_spec_loader for the 5
    # YAML-backed factories (issue #136 Phase 3.5). The env var
    # short-circuits the loader's path-resolution heuristic; the
    # checkout below populates the directory it points at.
    env:
      EMBODIED_SCHEMAS_DATA_DIR: ${{ github.workspace }}/embodied-schemas/src/embodied_schemas/data
    strategy:
      fail-fast: false
      matrix:
        # 3.9 dropped because embodied-schemas (transitive dep via the
        # SKU validator framework, generator, and YAML loader) declares
        # requires-python = ">=3.10".
        #
        # Matrix is conditional to keep PR cycle time short: PRs run
        # only the production target (3.12); pushes to main and manual
        # dispatches run the full sweep so any version-specific
        # breakage gets caught before release.
        python-version: ${{ fromJSON(github.event_name == 'pull_request' && '["3.12"]' || '["3.10", "3.11", "3.12"]') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Checkout embodied-schemas (PhysicalSpec data source)
        uses: actions/checkout@v6
        with:
          repository: branes-ai/embodied-schemas
          # Pinned to embodied-schemas main; bump when later schema
          # changes need to be picked up. History:
          #   PR #9  (e8c6c89) ProcessNode + CoolingSolution + KPU SKU schemas
          #   PR #10 (5abce59) per-(profile, precision) efficiency on KPUThermalProfile
          #   PR #11 (bd61f3c) FP16 throughput backfill on KPU tile classes
          #   PR #12 (3509e68) PROCESS_NODE_DATA_DIR env overlay (Phase 7)
          #   PR #13 (5741e75) per-profile Vdd + ProcessNode SRAM/NoC/DRAM energies
          #   PR #14 (846a0d2) KPU SKU naming convention (kpu_t<N>_..._<foundry>_<library>)
          #   PR #15 (60f210d) ComputeProduct v1 schema (KPU-only, additive)
          #   PR #16 (7babd4c) first ComputeProduct YAML + load_compute_products() loader
          #   PR #17 (845a9f2) remaining 11 KPU SKUs converted to ComputeProduct YAMLs
          #   PR #18 (181d725) retire legacy data/kpus/; load_kpus() becomes shim
          ref: 181d725e4ab0d29d5c9c89704702fee5ac347ee6
          path: embodied-schemas
          fetch-depth: 1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-py${{ matrix.python-version }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-py${{ matrix.python-version }}-pip-

      - name: Install dependencies
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -e .
          pip install -e ./embodied-schemas
          pip install pytest pytest-xdist

      - name: Run unit tests
        # -n 4 fans the 2,700-test suite across the 4 vCPUs of the
        # GitHub-hosted runner. Combined with the in-process CLI test
        # runner in tests/conftest.py (each subprocess CLI test
        # previously paid a ~2s torch-import tax), this drops the
        # unit-test step from ~10 minutes serial-with-coverage to ~2
        # minutes. Coverage is intentionally NOT collected here --
        # pytest-cov adds 30-40% overhead. Coverage runs in the
        # dedicated coverage.yml workflow on push to main and nightly;
        # PRs only need the pass/fail signal.
        run: |
          pytest tests/ -n 4 -v
          echo "Unit tests passed"

      - name: Run validation tests (smoke tests only)
        run: |
          # Run quick validation tests, skip slow ones
          pytest validation/hardware/ -v -k "not slow" || echo "⚠️  Some validation tests failed (non-blocking)"
          pytest validation/estimators/test_conv2d.py -v || echo "⚠️  Estimator tests failed (non-blocking)"
          pytest validation/analysis/test_building_blocks_simple.py -v || echo "⚠️  Analysis validation tests failed (non-blocking)"

  # Job 3: CLI Tools Smoke Tests
  cli-tools:
    name: CLI Tools
    runs-on: ubuntu-latest
    env:
      EMBODIED_SCHEMAS_DATA_DIR: ${{ github.workspace }}/embodied-schemas/src/embodied_schemas/data
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Checkout embodied-schemas (PhysicalSpec data source)
        uses: actions/checkout@v6
        with:
          repository: branes-ai/embodied-schemas
          # Pinned to embodied-schemas main; bump when later schema
          # changes need to be picked up. History:
          #   PR #9  (e8c6c89) ProcessNode + CoolingSolution + KPU SKU schemas
          #   PR #10 (5abce59) per-(profile, precision) efficiency on KPUThermalProfile
          #   PR #11 (bd61f3c) FP16 throughput backfill on KPU tile classes
          #   PR #12 (3509e68) PROCESS_NODE_DATA_DIR env overlay (Phase 7)
          #   PR #13 (5741e75) per-profile Vdd + ProcessNode SRAM/NoC/DRAM energies
          #   PR #14 (846a0d2) KPU SKU naming convention (kpu_t<N>_..._<foundry>_<library>)
          #   PR #15 (60f210d) ComputeProduct v1 schema (KPU-only, additive)
          #   PR #16 (7babd4c) first ComputeProduct YAML + load_compute_products() loader
          #   PR #17 (845a9f2) remaining 11 KPU SKUs converted to ComputeProduct YAMLs
          #   PR #18 (181d725) retire legacy data/kpus/; load_kpus() becomes shim
          ref: 181d725e4ab0d29d5c9c89704702fee5ac347ee6
          path: embodied-schemas
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -e .
          pip install -e ./embodied-schemas

      - name: Test discover_models
        run: |
          python cli/discover_models.py
          echo "✅ discover_models.py works"

      - name: Test graph_explorer (summary mode)
        run: |
          python cli/graph_explorer.py --model resnet18
          echo "✅ graph_explorer.py summary mode works"

      - name: Test graph_explorer (visualization mode)
        run: |
          python cli/graph_explorer.py --model resnet18 --max-nodes 10
          echo "✅ graph_explorer.py visualization works"

      - name: Test graph_explorer (range selection)
        run: |
          python cli/graph_explorer.py --model resnet18 --start 5 --end 10
          python cli/graph_explorer.py --model resnet18 --around 10 --context 2
          echo "✅ graph_explorer.py range selection works"

      - name: Test partition_analyzer
        run: |
          python cli/partition_analyzer.py --model resnet18 --strategy fusion --quantify
          echo "✅ partition_analyzer.py works"

      - name: Test partition_analyzer (visualization)
        run: |
          python cli/partition_analyzer.py --model resnet18 --strategy fusion --visualize --max-nodes 10
          echo "✅ partition_analyzer.py visualization works"

      - name: Test partition_analyzer (range selection)
        run: |
          python cli/partition_analyzer.py --model resnet18 --strategy fusion --visualize --start 5 --end 10
          echo "✅ partition_analyzer.py range selection works"

      - name: Test profile_graph
        run: |
          python cli/profile_graph.py --model resnet18
          echo "✅ profile_graph.py works"

      - name: Test list_hardware_mappers
        run: |
          python cli/list_hardware_mappers.py
          echo "✅ list_hardware_mappers.py works"

      - name: Test analyze_graph_mapping
        run: |
          python cli/analyze_graph_mapping.py --model resnet18 --hardware H100
          echo "✅ analyze_graph_mapping.py works"

  # Job 4: Examples Validation
  examples:
    name: Examples
    runs-on: ubuntu-latest
    env:
      EMBODIED_SCHEMAS_DATA_DIR: ${{ github.workspace }}/embodied-schemas/src/embodied_schemas/data
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Checkout embodied-schemas (PhysicalSpec data source)
        uses: actions/checkout@v6
        with:
          repository: branes-ai/embodied-schemas
          # Pinned to embodied-schemas main; bump when later schema
          # changes need to be picked up. History:
          #   PR #9  (e8c6c89) ProcessNode + CoolingSolution + KPU SKU schemas
          #   PR #10 (5abce59) per-(profile, precision) efficiency on KPUThermalProfile
          #   PR #11 (bd61f3c) FP16 throughput backfill on KPU tile classes
          #   PR #12 (3509e68) PROCESS_NODE_DATA_DIR env overlay (Phase 7)
          #   PR #13 (5741e75) per-profile Vdd + ProcessNode SRAM/NoC/DRAM energies
          #   PR #14 (846a0d2) KPU SKU naming convention (kpu_t<N>_..._<foundry>_<library>)
          #   PR #15 (60f210d) ComputeProduct v1 schema (KPU-only, additive)
          #   PR #16 (7babd4c) first ComputeProduct YAML + load_compute_products() loader
          #   PR #17 (845a9f2) remaining 11 KPU SKUs converted to ComputeProduct YAMLs
          #   PR #18 (181d725) retire legacy data/kpus/; load_kpus() becomes shim
          ref: 181d725e4ab0d29d5c9c89704702fee5ac347ee6
          path: embodied-schemas
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -e .
          pip install -e ./embodied-schemas

      - name: Run quick_start_partitioner
        run: |
          python examples/quick_start_partitioner.py
          echo "✅ quick_start_partitioner.py works"

      - name: Run visualize_partitioning
        run: |
          python examples/visualize_partitioning.py
          echo "✅ visualize_partitioning.py works"

      - name: Run demo_fusion_comparison
        run: |
          python examples/demo_fusion_comparison.py
          echo "✅ demo_fusion_comparison.py works"

  # Job 5: Code Quality (Linting)
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install linting tools
        run: |
          pip install ruff black isort mypy

      - name: Run ruff (fast linter)
        run: |
          ruff check src/ tests/ cli/ || echo "⚠️  Ruff found issues (non-blocking for now)"

      - name: Check code formatting (black)
        run: |
          black --check src/ tests/ cli/ || echo "⚠️  Black formatting issues (non-blocking for now)"

      - name: Check import order (isort)
        run: |
          isort --check-only src/ tests/ cli/ || echo "⚠️  Import order issues (non-blocking for now)"

      - name: Type checking (mypy - basic)
        run: |
          mypy src/graphs --ignore-missing-imports || echo "⚠️  Type checking issues (non-blocking for now)"

  # Job 6: Hardware Test Suite
  hardware-tests:
    name: Hardware Tests
    runs-on: ubuntu-latest
    env:
      EMBODIED_SCHEMAS_DATA_DIR: ${{ github.workspace }}/embodied-schemas/src/embodied_schemas/data
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Checkout embodied-schemas (PhysicalSpec data source)
        uses: actions/checkout@v6
        with:
          repository: branes-ai/embodied-schemas
          # Pinned to embodied-schemas main; bump when later schema
          # changes need to be picked up. History:
          #   PR #9  (e8c6c89) ProcessNode + CoolingSolution + KPU SKU schemas
          #   PR #10 (5abce59) per-(profile, precision) efficiency on KPUThermalProfile
          #   PR #11 (bd61f3c) FP16 throughput backfill on KPU tile classes
          #   PR #12 (3509e68) PROCESS_NODE_DATA_DIR env overlay (Phase 7)
          #   PR #13 (5741e75) per-profile Vdd + ProcessNode SRAM/NoC/DRAM energies
          #   PR #14 (846a0d2) KPU SKU naming convention (kpu_t<N>_..._<foundry>_<library>)
          #   PR #15 (60f210d) ComputeProduct v1 schema (KPU-only, additive)
          #   PR #16 (7babd4c) first ComputeProduct YAML + load_compute_products() loader
          #   PR #17 (845a9f2) remaining 11 KPU SKUs converted to ComputeProduct YAMLs
          #   PR #18 (181d725) retire legacy data/kpus/; load_kpus() becomes shim
          ref: 181d725e4ab0d29d5c9c89704702fee5ac347ee6
          path: embodied-schemas
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -e .
          pip install -e ./embodied-schemas
          pip install pytest

      - name: Run hardware validation tests
        run: |
          pytest tests/hardware/ -v || echo "✅ Hardware tests completed"

  # Job 7: Data Hygiene (no legacy measurement reads)
  data-hygiene:
    name: Data Hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check no legacy measurement JSON reads
        run: bash ci/check_no_legacy_json_reads.sh

  # Job 8: Bottom-Up Composition Check
  # Runs unconditionally (not path-gated) because:
  # - Fast (<5s with the current registry; grows slowly as phases add checks)
  # - A regression in resource_model.py can be triggered by code that doesn't
  #   touch hardware/models/ directly (e.g., a change in calibration fitters)
  # - Skipped jobs in GitHub Actions break the ci-success needs gate
  composition-check:
    name: Composition Check
    runs-on: ubuntu-latest
    env:
      EMBODIED_SCHEMAS_DATA_DIR: ${{ github.workspace }}/embodied-schemas/src/embodied_schemas/data
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Checkout embodied-schemas (PhysicalSpec data source)
        uses: actions/checkout@v6
        with:
          repository: branes-ai/embodied-schemas
          # Pinned to embodied-schemas main; bump when later schema
          # changes need to be picked up. History:
          #   PR #9  (e8c6c89) ProcessNode + CoolingSolution + KPU SKU schemas
          #   PR #10 (5abce59) per-(profile, precision) efficiency on KPUThermalProfile
          #   PR #11 (bd61f3c) FP16 throughput backfill on KPU tile classes
          #   PR #12 (3509e68) PROCESS_NODE_DATA_DIR env overlay (Phase 7)
          #   PR #13 (5741e75) per-profile Vdd + ProcessNode SRAM/NoC/DRAM energies
          #   PR #14 (846a0d2) KPU SKU naming convention (kpu_t<N>_..._<foundry>_<library>)
          #   PR #15 (60f210d) ComputeProduct v1 schema (KPU-only, additive)
          #   PR #16 (7babd4c) first ComputeProduct YAML + load_compute_products() loader
          #   PR #17 (845a9f2) remaining 11 KPU SKUs converted to ComputeProduct YAMLs
          #   PR #18 (181d725) retire legacy data/kpus/; load_kpus() becomes shim
          ref: 181d725e4ab0d29d5c9c89704702fee5ac347ee6
          path: embodied-schemas
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -e .
          pip install -e ./embodied-schemas

      - name: Run composition validation
        run: |
          python validation/composition/test_layer_composition.py --verbose

  # Job 9: SKU catalog validation gate (Phase 6)
  # Runs the full registry of SKU validators against every KPU YAML in
  # the embodied-schemas catalog. Fails the build on any ERROR finding
  # so a regression in a new SKU YAML (or in the validators themselves)
  # surfaces before merge. WARNINGs (the "DVFS throttle to N%"
  # diagnostics) are allowed; --strict would also fail on warnings.
  sku-catalog-gate:
    name: SKU Catalog Gate
    runs-on: ubuntu-latest
    env:
      EMBODIED_SCHEMAS_DATA_DIR: ${{ github.workspace }}/embodied-schemas/src/embodied_schemas/data
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Checkout embodied-schemas (PhysicalSpec data source)
        uses: actions/checkout@v6
        with:
          repository: branes-ai/embodied-schemas
          # Pinned to embodied-schemas main; bump when later schema
          # changes need to be picked up. History:
          #   PR #9  (e8c6c89) ProcessNode + CoolingSolution + KPU SKU schemas
          #   PR #10 (5abce59) per-(profile, precision) efficiency on KPUThermalProfile
          #   PR #11 (bd61f3c) FP16 throughput backfill on KPU tile classes
          #   PR #12 (3509e68) PROCESS_NODE_DATA_DIR env overlay (Phase 7)
          #   PR #13 (5741e75) per-profile Vdd + ProcessNode SRAM/NoC/DRAM energies
          #   PR #14 (846a0d2) KPU SKU naming convention (kpu_t<N>_..._<foundry>_<library>)
          #   PR #15 (60f210d) ComputeProduct v1 schema (KPU-only, additive)
          #   PR #16 (7babd4c) first ComputeProduct YAML + load_compute_products() loader
          #   PR #17 (845a9f2) remaining 11 KPU SKUs converted to ComputeProduct YAMLs
          #   PR #18 (181d725) retire legacy data/kpus/; load_kpus() becomes shim
          ref: 181d725e4ab0d29d5c9c89704702fee5ac347ee6
          path: embodied-schemas
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -e .
          pip install -e ./embodied-schemas
          pip install pytest

      - name: Run catalog-validation gate
        run: |
          python cli/validate_sku.py --all
          echo "✅ Catalog validation gate passed"

      - name: Run catalog-validation pytest gate
        run: |
          # The pytest version of the gate auto-discovers SKUs and
          # produces a structured per-SKU pass/fail report. Both the
          # CLI and pytest paths must pass.
          pytest tests/hardware/test_sku_catalog_validation.py -v

  # Job 10: Summary
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [package-check, test, cli-tools, examples, lint, hardware-tests, data-hygiene, composition-check, sku-catalog-gate]
    steps:
      - name: All checks passed
        run: |
          echo "=================================================="
          echo "All CI checks passed successfully!"
          echo "=================================================="
          echo ""
          echo "Summary:"
          echo "  Package installation verified"
          echo "  Tests passed on Python 3.10, 3.11, 3.12 (single-version 3.12 on PRs)"
          echo "  CLI tools working correctly"
          echo "  Examples validated"
          echo "  Code quality checked"
          echo "  Hardware tests completed"
          echo "  Data hygiene verified"
          echo "  Composition check passed"
          echo "  SKU catalog gate passed (Phase 6)"
          echo ""
          echo "Ready to merge!"
