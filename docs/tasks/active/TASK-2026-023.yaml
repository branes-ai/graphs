    type: "code"
    description: "Re-parameterize under dataflow-tile abstraction; PE array shape as design knob"
    acceptance: "Exposes pipeline_utilization, per-PE steady-state MAC energy, fill/drain separated"

  - path: "src/graphs/hardware/models/accelerators/kpu_t128.py"
