# Task: M0.5 KPU Dataflow-Tile Refinement + Compute-Archetype Comparison Harness
task_id: "TASK-2026-023"
title: "M0.5: KPU dataflow-tile model (T64/T128/T256) + GPU/TPU/KPU comparison harness"
version: "1.0"
created_at: "2026-04-20T00:00:00Z"
updated_at: "2026-04-20T00:00:00Z"

