classification:
  type: "feature"
  priority: "high"
  milestone: "M0.5"
  target_version: "0.10.0-microarch"
  estimated_effort: "7-10d"
  complexity: "high"

objective: |
  (A) Refine the KPU tile abstraction to reflect a distributed
  dataflow fabric with perfect-pipelining semantics (not matrix
  tiles chasing Tensor Core peak parity). Separate per-wavefront
  fill/drain from steady-state per-PE MAC energy. Surface
  pipeline_utilization as an explicit parameter.

  (B) Configure T64, T128 (new SKU), and T256 under the refined
  abstraction. PE array shape (16x16 / 32x32 / 64x64) is a design
  knob explored during this milestone.

  (C) Stand up the GPU vs. TPU vs. KPU compute-archetype comparison
  harness (compare_archetypes.html) with five visualizations
  designed around the product narrative:
    1. Energy per op at fixed precision
    2. Peak ops/s at fixed precision
    3. Ops/W
    4. Pipeline/utilization sensitivity
    5. PE array-size scaling

  (D) Internal-consistency unit tests asserting expected comparative
  behavior.

motivation: |
  The KPU's competitive positioning is energy per op in the
  pipelined steady state, not peak ops/s. The current tile model,
  set up for Tensor Core peak parity, obscures that story. The
  refined dataflow-tile model makes the energy advantage legible
  and exposes the load-bearing perfect-pipelining assumption so the
  story survives scrutiny.

  The comparison harness is the exploration tool used during this
  milestone to pick T64/T128/T256 array sizes, not just a
  deliverable for later review.

deliverables:
