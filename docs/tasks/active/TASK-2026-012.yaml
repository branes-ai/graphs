objective: |
  Stand up a six-layer bottom-up benchmark suite that measures each
  physical layer of the modeled micro-architectures in isolation, fits
  that layer's coefficients from measurement, and composes upward so
  the composite workload (ResNet, MobileNet, ViT, MLP) becomes a
  cross-check of the layered model rather than the source of
  calibration.

  The umbrella task coordinates six sub-tasks (TASK-2026-013 through
  TASK-2026-020) that implement the layers in dependency order
  (ALU -> register/SIMD -> scratchpad -> on-chip L3 -> DRAM -> cluster),
  with a Phase 0 foundation + Phase 0.5 power-measurement plumbing
  prerequisite.

motivation: |
  Today's calibration path is top-down: composite workloads are run
  against real hardware, fitted efficiency curves are back-propagated
  into the resource model, and the composite itself becomes the
  ground truth. This silently absorbs mis-cancellation between
  layers. For example, a 2x-high ALU energy that cancels against a
  0.5x-low cache energy can still produce a composite GEMM sweep that
  matches. Downstream claims ("KPU is 7x more energy-efficient than
  GPU for MLP") then rest on individual coefficients nobody has
  measured in isolation.

  A bottom-up path isolates each physical layer, fits its
  coefficients from a dedicated probe, and uses the composite
  workload as a cross-check. This also enables per-field
  EstimationConfidence propagation: a reader can ask "what is the
  confidence on the KPU L3 NoC energy for this SKU?" and get a
  truthful answer, not an inherited one.

