dependencies: []

interfaces_provided:
  - name: "LayerTag"
    signature: "enum(ALU, REGISTER_SIMD, SCRATCHPAD, ONCHIP, DRAM, CLUSTER, COMPOSITE)"
    module: "graphs.benchmarks.schema"
    description: "Layer taxonomy shared across all sub-tasks"

  - name: "field_provenance API"
    signature: "HardwareResourceModel.{set,get}_provenance, .aggregate_confidence()"
    module: "graphs.hardware.resource_model"
    description: "Per-field confidence annotations"

  - name: "Composition check registry"
    signature: "register_layer_check(CompositionCheck), run_all_checks() -> CompositionReport"
    module: "validation.composition.test_layer_composition"
    description: "Cross-layer consistency gate"

interfaces_consumed:
  - name: "EstimationConfidence"
    module: "graphs.core.confidence"
    description: "Confidence taxonomy used by field_provenance"

acceptance_criteria:
  - criterion: "All six sub-tasks (013..019) are complete and merged"
    verification: "All TASK-2026-013..019 state.status == completed"

  - criterion: "At least one fully-covered SKU (i7-12700K or Jetson Orin) has field_provenance populated for every roofline/energy field"
    verification: "python -c 'from graphs.hardware.mappers import get_mapper_by_name; m = get_mapper_by_name(...); print(m.resource_model.aggregate_confidence())' reports CALIBRATED"

  - criterion: "Composition test predicts ResNet-18 end-to-end latency and energy within 15% of measured composite on the fully-covered SKU"
    verification: "python validation/composition/test_layer_composition.py exits 0 with the ResNet-18 check registered"

  - criterion: "CI fails when a resource-model field regression exceeds the composition tolerance"
    verification: "Synthetic regression test against CI hook (added in Phase 0.5)"

constraints:
  - "No breaking changes to HardwareResourceModel public API"
  - "Composition test must be runnable both standalone and under pytest"
  - "Confidence propagation rule: aggregate = weakest across layers"
  - "Documentation per .claude/rules/validation.md: validation scripts standalone, tests pytest"

