classification:
  type: "feature"
  priority: "high"
  milestone: "M4"
  target_version: "0.10.0-microarch"
  estimated_effort: "3-4d"
  complexity: "medium"

objective: |
  Populate HardwareResourceModel.l2_cache_total (and
  l2_cache_per_unit where applicable) from datasheets; replace
  0.90 constant in DataParallelEnergyModel.l2_hit_rate with per-op
  lookup; parameterize L2 read/write energy; add analytical
  prefetch-effectiveness coefficient. Render Layer 4 panel with L2
  topology annotation (per-core vs. shared).

motivation: |
  Layer 4 is where GPU architectures that collapse L3 into an
  enlarged L2 start to diverge from the CPU-style three-level
  cache. The topology annotation keeps that visible in the report.

deliverables:
  - path: "src/graphs/hardware/models/**/*.py"
    type: "code"
    description: "Populate l2_cache_total (and l2_cache_per_unit) per SKU; L2 topology annotation (per-core vs shared)"
    acceptance: "Every SKU carries L2 fields with provenance"

  - path: "src/graphs/hardware/architectural_energy.py"
    type: "code"
    description: "Replace l2_hit_rate constant with per-op lookup; parameterize L2 energy; prefetch-effectiveness coefficient"
    acceptance: "Tagged THEORETICAL; defaults documented"

  - path: "src/graphs/reporting/layer_panels/layer4_l2_cache.py"
    type: "code"
    description: "Layer 4 panel; L2 topology annotation (per-core vs shared)"
    acceptance: "Renders per-SKU"

  - path: "tests/hardware/test_layer4_l2_cache_model.py"
    type: "test"
    description: "Self-consistency for L2 capacity, hit-rate, energy"

