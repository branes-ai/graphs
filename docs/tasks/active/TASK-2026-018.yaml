classification:
  type: "feature"
  priority: "high"
  milestone: "M4.5"
  target_version: "0.9.0-rc"
  estimated_effort: "1.5w"
  complexity: "high"

objective: |
  Measure the chip-wide L3 / LLC threshold, data-reuse behavior, and
  NoC-distance cost for mesh architectures:
    - Working-set sweep crossing x86 L3 boundary
    - GPU L2 hit-rate measurement via CUPTI / Nsight counters (replaces
      the fixed 0.90 constant in DataParallelEnergyModel)
    - KPU T256/T768 NoC near-tile vs far-tile cost (simulator until
      silicon)
    - Multi-core CPU coherence-traffic probe (true-sharing vs
      false-sharing vs padded)

motivation: |
  Layer 4 is where top-down calibration is most susceptible to
  mis-cancellation. L3 behavior affects nearly every composite
  workload, so an incorrect L3 energy per byte compensates for any
  other coefficient error. Directly measuring hit rate and NoC
  distance removes that hiding place.

deliverables:
  - path: "src/graphs/benchmarks/layer4_onchip/working_set_l3.py"
    type: "code"
    description: "Working-set sweep crossing L3 boundary"
    acceptance: "Produces L3 hit-rate curve"

  - path: "src/graphs/benchmarks/layer4_onchip/noc_distance.py"
    type: "code"
    description: "Mesh-distance sweep for tile arrays"
    acceptance: "Replaces KPU l3_routing_distance_factor constant"

  - path: "src/graphs/benchmarks/layer4_onchip/coherence_traffic.py"
    type: "code"
    description: "Multi-core CPU true/false/padded sharing"
    acceptance: "Quantifies coherence cost vs padding"

  - path: "src/graphs/benchmarks/layer4_onchip/gpu_l2_hitrate.py"
    type: "code"
    description: "CUPTI / Nsight-counter-backed L2 hit-rate measurement"
    acceptance: "Hit rate per op type; replaces 0.90 constant"

  - path: "src/graphs/calibration/fitters/layer4_onchip_fitter.py"
    type: "code"
    description: "Fit L3 capacity, NoC distance, L2 hit rate"
    acceptance: "Updates field_provenance"

  - path: "validation/composition/layer1_4_to_vit_mlp.py"
    type: "test"
    description: "Composition: Layer 1-4 -> ViT MLP block within 15%"

