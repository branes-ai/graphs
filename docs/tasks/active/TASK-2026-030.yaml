  type: "feature"
  priority: "high"
  milestone: "M7"
  target_version: "0.10.0-microarch"
  estimated_effort: "3-4d"
  complexity: "medium"

objective: |
  Populate HardwareResourceModel.peak_bandwidth and energy_per_byte
  from TechnologyProfile per memory technology (HBM2e, HBM3,
  HBM3e, GDDR6, DDR5, LPDDR5, LPDDR5X). Read/write asymmetry
  coefficients. Access-pattern overhead multipliers (sequential vs
  strided vs random). Render Layer 7 panel; memory-technology
  comparison chart; bandwidth-vs-pJ/byte scatter across SKUs.

motivation: |
  External-memory coefficients are the largest contributor to
  memory-bound workload energy; the pJ/byte comparison across
  HBM / GDDR / DDR / LPDDR is a visually striking chart for the
  M8 engineering deck.

deliverables:
  - path: "src/graphs/hardware/resource_model.py"
    type: "code"
    description: "Populate peak_bandwidth and energy_per_byte per SKU from TechnologyProfile; asymmetric read/write values"
    acceptance: "Every SKU carries values with provenance"

  - path: "src/graphs/hardware/architectural_energy.py"
    type: "code"
    description: "Access-pattern overhead multipliers (sequential, strided, random)"
    acceptance: "Tagged THEORETICAL; defaults documented"

  - path: "src/graphs/reporting/layer_panels/layer7_external_memory.py"
    type: "code"
    description: "Layer 7 panel; memory-technology comparison chart; bandwidth-vs-pJ/byte scatter"
    acceptance: "Renders per-SKU and in cross-SKU comparison"

  - path: "tests/hardware/test_layer7_external_memory_model.py"
    type: "test"
    description: "Self-consistency: read/write asymmetry within expected ranges; pJ/byte monotone with technology generation"

