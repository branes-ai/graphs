    description: "Phase 0 foundation must land first"
  - module: "graphs.benchmarks.schema"
    classes: ["BenchmarkResult"]
  - external: "RAPL on Intel Linux host (/sys/class/powercap/intel-rapl)"
    description: "Only for RAPL backend"
  - external: "tegrastats on Jetson"
    description: "Only for tegrastats backend"
  - external: "pynvml"
    description: "Only for NVML backend; optional dependency"

interfaces_provided:
  - name: "PowerMeter"
    signature: "class PowerMeter (abstract): __enter__, __exit__, energy_joules, avg_power_watts"
    module: "graphs.benchmarks.power_meter"
    description: "Context manager that measures energy during its scope"

  - name: "RAPLPowerMeter"
    module: "graphs.benchmarks.power_meter"
    description: "Intel RAPL backend (reads /sys/class/powercap)"

  - name: "TegrastatsPowerMeter"
    module: "graphs.benchmarks.power_meter"
    description: "Jetson tegrastats backend (parses CPU_POW/GPU_POW fields)"

  - name: "NVMLPowerMeter"
    module: "graphs.benchmarks.power_meter"
    description: "NVML backend for discrete NVIDIA GPUs"

  - name: "auto_select_power_meter"
    signature: "(device: str) -> PowerMeter"
    module: "graphs.benchmarks.power_meter"
    description: "Pick the best available backend for the device; NoOp fallback"

interfaces_consumed:
  - name: "BenchmarkResult.energy_joules"
    module: "graphs.benchmarks.schema"
  - name: "register_layer_check"
    module: "validation.composition.test_layer_composition"

acceptance_criteria:
  - criterion: "PowerMeter populates BenchmarkResult.energy_joules on i7-12700K"
    verification: "Run GEMM bench with RAPL, assert energy_joules > 0"

  - criterion: "PowerMeter returns NoOp on CI runners without power domains"
    verification: "Unit test with mocked host"

  - criterion: "CI composition-check workflow triggers on resource-model edits"
    verification: "Synthetic PR touching resource_model.py fails CI when a regression is injected"

  - criterion: "RAPL sampling interval documented and honored (min measurement duration)"
    verification: "power_meter.py has MIN_MEASUREMENT_MS enforced; documented in power-measurement.md"

constraints:
  - "pynvml is an optional dependency (only required if NVMLPowerMeter is selected)"
  - "No root privileges required on development hosts (RAPL needs read access to /sys; document setup)"
  - "CI runners do not have power domains: must not fail if no PowerMeter is available"
  - "Do not break existing runner.py tests"

testing:
