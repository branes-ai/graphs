objective: |
  Deferred Phase 0 items 5 and 6:

  5. PowerMeter abstraction (src/graphs/benchmarks/power_meter.py)
     with concrete backends for:
     - Intel RAPL (x86 Linux hosts)
     - Jetson tegrastats (Orin Nano / AGX)
     - NVIDIA NVML (discrete GPU hosts)
     - NoOp fallback when no power domain is available
     The abstraction returns energy_joules + avg_power_watts alongside
     wall-clock timing so BenchmarkResult.energy_joules is populated
     wherever the host supports it.

  6. CI hook that runs validation/composition/test_layer_composition.py
     on every PR that modifies:
       - src/graphs/hardware/resource_model.py
       - src/graphs/hardware/architectural_energy.py
       - src/graphs/hardware/models/**/*.py
     The hook fails the PR when any registered composition check
     regresses beyond the check's tolerance.

motivation: |
  PowerMeter is a prerequisite for every subsequent phase: Layer 1
  needs pJ/op, Layer 5 needs pJ/byte, and the composition tests'
  energy predictions need a measured baseline on the target SKU.

  CI integration turns the composition registry from a nice-to-have
  diagnostic into an actual regression gate. Without it, a subtle
  change to a resource-model coefficient can silently drift the
  model, and the bottom-up methodology loses its primary advantage.

  Both items were deferred from Phase 0 because they need the target
  machine selected (i7-12700K for RAPL vs. Jetson for tegrastats) and
  because bundling them with pure-software Phase 0 would have
  confused review of that PR.

deliverables:
  - path: "src/graphs/benchmarks/power_meter.py"
    type: "code"
    description: "PowerMeter abstraction + RAPL / tegrastats / NVML / NoOp backends"
    acceptance: "Works on i7-12700K (RAPL) and Jetson Orin Nano (tegrastats); returns NoOp on hosts without power domain"

  - path: "src/graphs/benchmarks/runner.py"
    type: "code"
    description: "Integrate PowerMeter into the benchmark runner so BenchmarkResult.energy_joules is populated automatically"
    acceptance: "Existing runner tests still pass; new runs include energy when PowerMeter is available"

  - path: "tests/benchmarks/test_power_meter.py"
    type: "test"
    description: "PowerMeter unit tests (mocked backends + NoOp fallback)"
    acceptance: "Coverage >= 80%; no host power access required"

  - path: ".github/workflows/composition-check.yml"
    type: "config"
    description: "CI workflow running validation/composition/test_layer_composition.py"
    acceptance: "Triggers on PRs touching resource_model / architectural_energy / hardware/models; fails on regression"

  - path: "docs/designs/power-measurement.md"
    type: "documentation"
    description: "Document PowerMeter API, backend selection, sampling semantics, and known limitations (RAPL 10 ms sampling, tegrastats fused CPU+GPU reporting)"
    acceptance: "Reviewed by @stillwater"

dependencies:
