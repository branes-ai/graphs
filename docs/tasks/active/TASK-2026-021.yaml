classification:
  type: "epic"
  priority: "high"
  milestone: "microarch-delivery"
  target_version: "0.10.0-microarch"
  estimated_effort: "7-9w"
  complexity: "high"

objective: |
  Deliver analytical energy and latency models for Layers 1-7 of the
  9-layer micro-architectural hierarchy, end-to-end through a
  Branes-branded reporting tool (HTML + PowerPoint + JSON), on a
  compressed schedule for investor presentations and product
  planning.

  System-level validation (microbenchmark kernels, power-meter
  integration, measurement campaigns, CI residual gates) is
  explicitly deferred to a follow-on phase after this epic ships.
  Layers 8 (intra-server) and 9 (inter-server) are out of scope for
  this delivery.

motivation: |
  Stakeholder timelines require quantitative, layered,
  cross-architecture comparisons on a short horizon. Measurement-
  driven validation (the existing TASK-2026-013..020 track) is the
  correct long-term foundation but will not land in time. This epic
  delivers model content first, ships externally under Branes
  branding with honest confidence annotations
  (THEORETICAL / INTERPOLATED), and leaves hooks for measurement to
  plug in after M8.

