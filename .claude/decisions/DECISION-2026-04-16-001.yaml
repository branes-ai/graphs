# Decision: Additive re-export subpackage for calibration fitters
decision_id: "DECISION-2026-04-16-001"
timestamp: "2026-04-16T00:00:00Z"
ai_model: "claude-opus-4-6-20260101"
session_id: ""

summary: |
  graphs.calibration.fitters ships as an additive re-export layer in
  Phase 0 rather than physically relocating the legacy fitter modules.
  Existing import paths continue to work unchanged; new (Phase 1+)
  fitters land in graphs.calibration.fitters directly. Physical
  relocation of the legacy modules is deferred to a follow-up cleanup
  PR.

trigger:
  type: "user_request"
  content: |
    Phase 0 item 2 of docs/plans/bottom-up-microbenchmark-plan.md:
    "Add calibration/fitters/ subpackage; move existing
    energy_fitter.py, roofline_fitter.py, efficiency_curves.py into
    fitters/ namespace and re-export for backward compat."
  context: |
    An audit showed the legacy fitter modules are imported directly
    from graphs.calibration.<fitter> in:
      - cli/fit_calibration.py
      - tests/calibration/test_{energy,roofline,utilization}_fitter.py
      - internal calibration modules (power_model, utilization_curves,
        utilization_fitter)
    Any physical relocation would cascade updates across the CLI,
    test suite, and internal calibration imports in a single
    foundation PR whose stated purpose is to be additive and
    non-breaking.

alternatives:
  - option: "Physically move fitter files to calibration/fitters/ with shim modules at legacy paths"
    pros:
      - "End state is clean; new canonical path is the only real home"
      - "Deprecation-warning shims guide future readers"
    cons:
      - "Touches tests, CLI, and internal imports in a PR whose scope is foundation"
      - "Shims that forward __all__ are fragile for non-exported names"
      - "Review burden shifts from API-surface to refactor mechanics"
    selected: false
    rejected_reason: "Increases PR blast radius beyond Phase 0 scope and mixes two concerns"

  - option: "Additive graphs.calibration.fitters package that re-exports from existing locations"
    pros:
      - "Zero behavior change for existing code"
      - "New (Phase 1+) fitters land in the canonical path from day one"
      - "Review can focus on the Phase 0 API additions"
      - "Physical relocation becomes a focused, testable cleanup PR later"
    cons:
      - "Two import paths resolve to the same object during the transition"
      - "Identity (not just equality) must be enforced via tests to guarantee isinstance() behaves"
    selected: true
    selected_reason: |
      Minimizes Phase 0 blast radius while still opening the canonical
      path for Phase 1+ fitters. Identity tests in
      tests/calibration/test_fitters_namespace.py make the re-export
      guarantee load-bearing rather than accidental.

