# ============================================================================
# SUMMARY
# ============================================================================
summary: "Adopt a self-describing KPU SKU naming convention catalog-wide (kpu_t<count>_<rows>x<cols>_<mem><ch>_<value>nm_<foundry>_<library>) with full migration of legacy stillwater_kpu_t* SKUs. Library tag carries product positioning (fdx/ull energy-eff, hpc datacenter, lpp/pp/ffp performance). Vendor encoded in directory path. list_kpus.py gains --foundry / --node-nm / --library filter flags so 'vary one variable at a time' comparison sweeps are query-able. Tier vocabulary expanded from entry/mid/high/datacenter to entry/mid/high/enthusiast/datacenter."

# ============================================================================
# TRIGGER
# ============================================================================
trigger:
  type: "user_request"
  content: "Initial: 'For the list_kpus.py query to be useful, and for kpu studies in general, we need to follow a strict comparison protocol that varies only one variable at the time. The variables we are interested in are array size, array type, tile arity, memory type, memory controller arity, process node, and likely more in the future. To differentiate skus, we need these attributes in the name. You can remove the superfluous \"stillwater_\" from the SKU name so that we gain some characters. Can you propose three different SKU naming conventions that could support our requirement?' Plus subsequent refinements: 'Option B is better, but always start with the number of tiles', 'add the foundry name as additional segment, so _12nm_gf', 'don't make an exception for tsmc, add the library designation explicit as well', and 'remove the old stillwater_ named skus, which are now deprecated'."
  context: "After the prior decisions to fix the t256 PE-array discontinuity (uniform 32x32 with t64/t128) and adopt derived TDP, the catalog had 4 SKUs whose names (stillwater_kpu_t64/128/256/768) didn't carry their architecturally-distinguishing dimensions. With sweeps coming (PE-array roadmap, cross-foundry comparison, etc.), the user wanted the SKU id itself to identify the configuration. Three convention proposals were presented (positional all-fields-explicit / compact-with-feature-tags / faceted-kebab); user picked compact, then refined the format across multiple rounds: tile count first as the strongest top-level attribute, process node as <value>nm matching industry usage, foundry as separate segment to dodge cross-foundry collisions (12nm alone is ambiguous between GF 12FDX, GF 12LP+, TSMC N12), and library tag always required because it conveys product positioning."

# ============================================================================
# ALTERNATIVES CONSIDERED
# ============================================================================
alternatives:
  - option: "Convention A -- Full positional encoding (all fields explicit, fixed order, prefixed)"
    pros:
      - "Every variable visible in the id; zero ambiguity"
      - "Alphabetical sort groups by tile count first then PE array"
      - "Trivially machine-parseable; impossible to misread"
      - "New fields appended at the end stay backward-compatible"
    cons:
      - "Long names (35-45 chars per SKU); the cls/sched fields are usually constant and feel like noise"
      - "Verbose for the common case where most fields are at family defaults"
    selected: false
    rejected_reason: "User picked the more compact Convention B for everyday use. The zero-ambiguity benefit doesn't outweigh the typing cost for catalogs where most fields are at family defaults."

  - option: "Convention C -- Faceted kebab-case with sweep-axis-first ordering"
    pros:
      - "Most-varied dimension first (PE array) makes the changed field jump out visually in any sweep"
      - "Dual separator ('-' for top-level, '_' inside compound fields) keeps compound fields legible"
      - "Better matches the actual workflow: 'what changed?' answers immediately"
    cons:
      - "Kebab-case is mildly unusual in the Python ecosystem (filenames typically '_')"
      - "Mixed '-' / '_' requires discipline; ordering convention has to be memorized"
      - "Fixed sweep-first ordering occasionally feels backwards if you think 'tile count first'"
    selected: false
    rejected_reason: "User explicitly preferred tile count first ('the strongest, top-level attribute'). The sweep-axis-first ordering's clever readability didn't outweigh the conventional 'product-name first' mental model."

  - option: "Soft deprecation: keep stillwater_kpu_t* SKUs but mark is_discontinued=true; new work uses new convention"
    pros:
      - "Zero breakage in existing tests / mappers / factories / hardware_registry / CLI tools / docs"
      - "Legacy SKUs stay as historical/comparison data"
      - "Migration scope minimal -- just add new SKUs under the new convention"
    cons:
      - "Catalog has two parallel naming conventions indefinitely -- confusing for new contributors"
      - "Comparison protocol breaks: stillwater_kpu_t64 vs kpu_t64_..._12nm_gf_fdx don't visibly identify their differences in the SKU id"
      - "list_kpus.py output is bimodal; query flags have to handle both naming patterns"
    selected: false
    rejected_reason: "User explicitly chose 'Full migration: rename to new convention, keep all data' after seeing the soft-deprecation alternative. Coexistence is worse than committing to one convention."

  - option: "Convention B -- Compact dimensional code, with refinements: tile-count-first, foundry-as-separate-segment, library-tag-always-required"
    pros:
      - "Tile count first matches user mental model ('the strongest top-level attribute')"
      - "Compact (~30-35 chars per SKU) with all six dimensions still visible"
      - "Foundry as separate segment dodges cross-foundry collisions (12nm alone is ambiguous between GF 12FDX, GF 12LP+, TSMC N12; 12nm_gf still has variant ambiguity within GF, resolved by mandatory library tag)"
      - "Library tag carries product positioning (fdx/ull energy-eff, hpc datacenter, lpp/pp/ffp performance) -- semantic value beyond disambiguation"
      - "Library-tag-always-required catches future cases (Intel 14nm vs 14nm++) without retroactive renames"
      - "list_kpus.py with --foundry / --node-nm / --library filter flags makes 'vary one variable at a time' query-able"
    cons:
      - "Names are longer than the legacy stillwater_kpu_t* convention (~30-35 chars vs ~18)"
      - "Memory shorthand has parsing ambiguity if the shorthand ends in a digit (lp5x4 could mean lpddr5x with 4 channels OR lpddr5 with 4 channels); requires committing to one variant per memory family in the catalog"
      - "Library tag may not always be unambiguous (GF has 12FDX/12LP/12LP+ all at 12nm; rare but real)"
      - "Migration touched 30+ files: 4 catalog YAMLs renamed, 8 graphs source files (factories, mappers, loader, validators), 5 tests, 3 hardware_registry directories, 6 CLI tools, 2 docs"
    selected: true
    selected_reason: "Best balance of the three properties the user cares about: (1) every architecturally-distinguishing dimension visible in the id, (2) library tag carries semantic positioning info, not just disambiguation, (3) compact enough to type in CLI args. Migration cost is one-time; convention payoff is permanent. Cross-foundry comparison sweep on the fresh-renamed catalog (12FDX vs N7 HPC at fixed architecture) demonstrates the convention works as intended -- the only difference between two compared SKUs is the foundry+library segment, exactly what the user wanted."

