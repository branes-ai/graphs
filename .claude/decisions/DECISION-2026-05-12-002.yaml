# ============================================================================
# RISK ASSESSMENT
# ============================================================================
risks:
  - risk: "Memory shorthand parsing ambiguity if the catalog ever has both lpddr5 and lpddr5x at the same channel count (e.g., lp5x4 could mean either)"
    mitigation: "Catalog currently has only lpddr5x; if both are needed in the future, switch to channel-prefix convention (lp5c4 vs lp5xc4) uniformly. Not blocking today"
    severity: "low"
    likelihood: "low"
  - risk: "Library-tag-not-unique case for foundries with multiple processes at the same node label (GF 12FDX/12LP/12LP+ all '12nm'; Intel 14nm/14nm+/14nm++)"
    mitigation: "Catalog name uses the foundry's variant code (12fdx, 12lpp, 14pp) rather than just the marketing nm; the convention's library segment IS that variant code. Cross-foundry comparison still works because foundry segment disambiguates"
    severity: "low"
    likelihood: "medium"
  - risk: "30+ files touched in the rename migration; CI/test/CLI/docs all need updating in lockstep"
    mitigation: "Mechanical sed renames + reviewable diff; tests catch missed references. Pre-existing test failures revealed by the broader change were also fixed in the same migration to keep CI green"
    severity: "low"
    likelihood: "low"
  - risk: "Heterogeneous-PE-array tile mixes (t768's 16x8 INT8/BF16 + 8x8 systolic Matrix) currently encoded by the dominant tile-class size; convention may need a variant suffix when more SKUs use this pattern"
    mitigation: "Internal YAML carries the full truth (KPUTileSpec per tile class); naming convention is a best-effort summary. Variant suffix can be added if needed (e.g., '_+matrix8'). Not blocking today since t768 is the only such SKU"
    severity: "low"
    likelihood: "medium"
  - risk: "Tier vocabulary 'enthusiast' is a marketing term; may not be the right tier label for B2B AI accelerator audience"
    mitigation: "Term is established across CPU (Intel Core X / AMD Threadripper) and GPU (NVIDIA RTX Spark / Titan / DGX Spark) markets, where the customers are similar to KPU enthusiast-tier buyers (developers, researchers, robotics labs). Easy to rename later if the audience prefers another term ('workstation', 'prosumer')"
    severity: "low"
    likelihood: "low"

