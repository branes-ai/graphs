# ============================================================================
# SUMMARY
# ============================================================================
summary: "Model the attention head as a decomposed computational graph of existing operators (no fusion) as the v1 validation baseline; quantify the fusion gap when fused kernels (FlashAttention) land later."

# ============================================================================
# TRIGGER
# ============================================================================
trigger:
  type: "user_request"
  content: "expand on the attention head modeling as first decomposing the attention head into the computational graph it represents, which should have all operators that map onto the set we already have defined. This will miss operator fusion optimizations, but it is a good first order assessment when the compiler and runtime are still under development."
  context: "User reviewing the operator-validation-expansion-plan (Phase 5 of which is attention-head modeling). Initial draft proposed treating attention head as an atomic op with its own footprint formula. User redirected to a decomposition-first framing."

# ============================================================================
# ALTERNATIVES CONSIDERED
# ============================================================================
alternatives:
  - option: "Atomic-op model: treat attention head as a single operator with closed-form FLOPS/bytes/AI"
    pros:
      - "Single calibration target per (hw, op)"
      - "Matches how FusedMHA / FlashAttention are actually shipped"
      - "Smaller analyzer surface area"
    cons:
      - "Requires per-implementation calibration (FlashAttention v1, v2, v3, FusedMHA, ...)"
      - "Can't introspect which sub-op is causing prediction error"
      - "Doesn't validate the analyzer's compositionality"
      - "Hides the fusion gap from architects -- they can't see what an unfused baseline would predict"
    selected: false
    rejected_reason: "The compiler / runtime layer is still under development; the realistic deployment baseline is PyTorch eager (which IS the unfused decomposition). Atomic-op modeling would couple validation to a specific fused implementation."

  - option: "Decomposition-first: attention head = computational graph of already-modeled operators (linear, matmul, element-wise scale, softmax). Validate the composed prediction against PyTorch eager."
    pros:
      - "Every node is an operator we already have -- no new atomic ops to characterize"
      - "Validates that the analyzer composes per-op models correctly"
      - "If composed prediction is off, we know which sub-op to re-calibrate"
      - "Matches PyTorch eager (the realistic baseline before any compiler work lands)"
      - "When fused kernels land later, measured-fused vs predicted-unfused = the fusion uplift -- an architecturally meaningful number that prioritizes compiler / runtime work"
      - "Forces the design of composite-op infrastructure (lands in Phase 3 for softmax) which subsequent phases inherit"
    cons:
      - "Decomposed prediction will look 'wrong' against fused-runtime measurements -- need clear documentation of the gap so V4 floor tests don't misfire"
      - "Doesn't directly validate fused-kernel implementations (those need a separate FlashAttention op as a follow-up)"
      - "Larger total analyzer surface (per-sub-op + composition logic) than atomic"
    selected: true
    selected_reason: "Right first-order assessment for the current state of the stack. The fusion gap is itself the most useful signal -- it tells the compiler / runtime team where to invest. Atomic-op modeling would obscure this signal."

