# ============================================================================
# RISK ASSESSMENT
# ============================================================================
risks:
  - risk: "Decomposed prediction will look 2-5x slower than fused-kernel measurements for long-sequence attention; if V4 floor tests are added against fused measurements, they will fail by construction"
    mitigation: "Phase 5 acceptance criteria explicitly target PyTorch eager (decomposition-matching) measurements, not fused-runtime measurements. The fusion gap is documented as a separate quantification target, not a regression."
    severity: "medium"
    likelihood: "medium"

  - risk: "Composite-op infrastructure (Phase 3) is the unknown. If the design doesn't generalize cleanly to attention's complex dataflow (3 inputs, 1 intermediate that flows into 2 ops), Phase 5 may need substantial rework"
    mitigation: "Phase 3 deliverable PR-A is explicitly scoped to design + implement composite-op infrastructure with softmax as the first consumer. If the design doesn't generalize, that surfaces in Phase 3 review, not Phase 5."
    severity: "medium"
    likelihood: "low"

  - risk: "Per-sub-op calibration error compounds. If matmul prediction is off 10% and softmax is off 15%, attention head could be off 30%+. The composed metric is more sensitive than any individual op"
    mitigation: "Phase 5 acceptance criteria use 30% latency tolerance (looser than per-op 25%) explicitly to allow compounding. If compound exceeds 30%, that's a signal to re-calibrate the offending sub-op."
    severity: "low"
    likelihood: "medium"

