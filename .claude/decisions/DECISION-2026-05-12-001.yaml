# ============================================================================
# SUMMARY
# ============================================================================
summary: "Derive KPU thermal-profile TDP from chip configuration via a 5-term roll-up (PE compute + L2 + L3 + NoC + DRAM PHY + leakage) with V^2*f scaling instead of trusting the architect-declared tdp_watts. Required schema additions on ProcessNodeEntry (sram/dram/noc per-byte-or-flit energies) and KPUThermalProfile (per-profile vdd_v + activity_factor)."

# ============================================================================
# TRIGGER
# ============================================================================
trigger:
  type: "user_request"
  content: "Initial: 'yes, derive TDP from configuration' (after the prior session flagged it as a follow-up). Mid-session course correction after seeing the first cut: 'how do you get different profiles, such as 11.3/12.3/13.2 for the t64? I need to understand that first before I can answer your questions.' Final scope decision: 'Add SRAM/NoC/DRAM energy terms.'"
  context: "The prior session's PR #155-precursor work fixed t256's PE array (20x20 -> 32x32 uniform with t64/t128) but flagged a project-direction note: 'TDP should now be generated from the KPU configuration, and the fact that the T256 has a different array size is creating a bad discontinuity.' This session was the implementation of that direction. The user-driven correction was that the initial compute-only model's per-profile TDP spread was too narrow (t64 across 850/900/950 MHz only swung TDP 12% because varying clock alone at fixed Vdd is linear); real chips like Orin span 3-5x via V^2*f, requiring per-profile Vdd in the schema. The fidelity decision (compute-only vs full memory subsystem) was framed against 4 SKU calibration data showing compute-only undercounted t768 by 56% while landing within 20% on t64/t128/t256."

# ============================================================================
# ALTERNATIVES CONSIDERED
# ============================================================================
alternatives:
  - option: "Compute-only model with per-profile activity_factor"
    pros:
      - "Quick win: single ProcessNode lookup (energy_per_op_pj) already in the schema"
      - "Lands within 20% on t64/t128/t256 with default activity_factor=0.15"
      - "Architect tunes activity_factor per profile to absorb missing terms"
      - "No new schema fields on ProcessNode required"
    cons:
      - "Undercounts memory-heavy SKUs by 56% (t768 derived 26.6W vs catalog 60W) because compute-only misses L2/L3 access power, NoC traversal, DRAM PHY"
      - "activity_factor becomes a fudge factor that the architect tunes per-profile to make derived TDP match -- which is the same hand-authoring with extra steps, not real derivation"
      - "Doesn't honor the user's roadmap-honesty goal: PE-array sweeps would scale TDP non-physically because memory term is absent"
    selected: false
    rejected_reason: "User picked the fuller model after seeing the compute-only fidelity data: 'Add SRAM/NoC/DRAM energy terms.' The compute-only model would have shipped a TDP-derivation feature that doesn't actually derive TDP from physics for the SKUs that matter most (datacenter t768)."

  - option: "Annotate existing TDP with derived value, don't overwrite"
    pros:
      - "Least disruptive: catalog stays as-is"
      - "Architect uses the ratio between architect-declared and derived TDP to scale when sweeping"
      - "No risk of breaking downstream consumers that read tdp_watts"
    cons:
      - "Fails the stated goal -- TDP is no longer derived from configuration if the architect-declared value remains the source of truth"
      - "Catalog and model disagree silently; downstream tools have to know which value to trust"
      - "Roadmap sweeps still produce hand-tuned TDPs unless the architect maintains the ratio per profile"
    selected: false
    rejected_reason: "Doesn't solve the stated problem. The user wants honest cost/perf curves from PE-array sweeps; that requires the catalog's tdp_watts to BE the derived value, not an annotation alongside it."

  - option: "Full derivation: compute + SRAM access + NoC + DRAM PHY + leakage, with V^2*f scaling on dynamic terms"
    pros:
      - "Physics-defensible: every term traces to a ProcessNode-level energy figure (energy_per_op_pj for compute, sram_access_pj_per_byte for L2/L3, noc_pj_per_flit_per_hop for NoC, dram_io_pj_per_byte for PHY) and a workload-level access-rate assumption (compute_duty_cycle, bytes_per_op, L1/L2/L3 hit rates)"
      - "Lands within 0.5W of catalog targets on all 4 legacy SKUs after architect picks (clock, Vdd) per profile"
      - "Captures the cross-foundry comparison cleanly: same architecture + same operating point on N7 HPC vs 12FDX gives 10W vs 22W (process-node delta in isolation)"
      - "PE-array sweeps now produce roadmap-honest TDPs: bigger PE arrays draw more compute power, which scales with V^2*f per profile"
      - "Per-profile vdd_v lets architects express Orin-style DVFS where lower-power modes drop both clock AND voltage; the V^2*f product spreads TDP across profiles as expected (fixed-Vdd clock-only would give 12% spread on t64)"
    cons:
      - "Larger schema surface area: 3 new ProcessNode fields + 2 new KPUThermalProfile fields"
      - "Required dropping catalog clocks substantially (t256 default 1400 -> 600 MHz) because the prior catalog clocks were aspirational marketing numbers; architect-declared TDPs were unachievable at those clocks under any reasonable workload"
      - "Workload assumption (compute_duty_cycle=0.15 etc.) is itself a tunable -- architect-supplied if non-default per-SKU"
      - "Leakage held flat at nominal_vdd_v in this version (a known limitation; tracked as graphs#154)"
    selected: true
    selected_reason: "User picked it after seeing the compute-only model's t768 undercount. The fuller model is the only path that honors 'TDP derived from configuration' for both edge and datacenter SKUs. The catalog-clock drop is a feature, not a bug -- it makes the catalog match physical reality, which is what the comparison protocol needs."

