# ============================================================================
# RISK ASSESSMENT
# ============================================================================
risks:
  - risk: "Catalog clocks dropped 40-60% on edge SKUs (t256 default 1400 -> 600 MHz). Marketing positioning for these SKUs may need re-derivation -- the prior 'high boost clock' numbers were aspirational"
    mitigation: "New clocks line up with real-world Orin AGX operating points (420/624/828 MHz at 15/30/50W). Honest catalog values are more useful for procurement / architecture decisions than aspirational ones"
    severity: "medium"
    likelihood: "high"
  - risk: "Leakage is held at nominal_vdd_v across all profiles (V^2*f scaling applies only to dynamic terms). Low-power profiles overstate leakage by 2-3x under physical sub-threshold scaling"
    mitigation: "Tracked as graphs#154; proposes either a per-node leakage_vdd_exponent scalar or a per-library leakage_vdd_curve sample list on ProcessNodeEntry. Doesn't affect the high-power profiles where leakage is small relative to dynamic"
    severity: "low"
    likelihood: "high"
  - risk: "WorkloadAssumption defaults (compute_duty_cycle=0.15 etc.) are a single calibration point; different KPU-target workloads (memory-bound LLM inference vs compute-bound batch) may need different defaults per-SKU or per-profile"
    mitigation: "The optional activity_factor per thermal profile lets architects tune relative to the workload baseline without changing global defaults. WorkloadAssumption is a function arg to generate_kpu_sku() so callers can override per-SKU"
    severity: "low"
    likelihood: "medium"
  - risk: "Adding 3 fields to ProcessNodeEntry + 2 fields to KPUThermalProfile is a schema break for downstream consumers if they validate strict-mode against the schema"
    mitigation: "All 5 new fields are Optional with sensible defaults (Vnom for vdd_v, None / empty-dict for the rest). Existing catalog YAMLs without these fields still load; the power model falls back to ProcessNode.nominal_vdd_v and to default workload constants. embodied-schemas PR #13 + #14 ship the fields ahead of consumers needing them"
    severity: "low"
    likelihood: "low"

