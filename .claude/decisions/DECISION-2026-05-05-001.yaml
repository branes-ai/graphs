  - risk: "Issue #81 could languish; the xfail outlives its tracking utility"
    mitigation: "The xfail is visible in every CI run as 'XFAIL' in the test summary. A long-running xfail is itself a signal to revisit the underlying issue. Worst case: the V4 plan owner periodically audits xfails."
    severity: "low"
    likelihood: "medium"

  - risk: "If the KPU energy model gets calibrated correctly but the xfail isn't removed, CI keeps flagging XPASS(strict) and blocks merges until the test is updated"
    mitigation: "This is exactly the desired behavior; XPASS(strict) is the auto-clean signal. The PR that fixes #81 will need to also remove the xfail marker as part of its scope -- which is correct hygiene."
    severity: "low"
