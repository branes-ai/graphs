# ============================================================================
# SUMMARY
# ============================================================================
summary: "V4-5 KPU consistency invariants: use pytest.mark.xfail(strict=True) with #81 as tracking issue for the known-violated avg_power_below_tdp check, rather than disabling the check or loosening its threshold."

# ============================================================================
# TRIGGER
# ============================================================================
trigger:
  type: "user_request"
  content: "proceed with V4-5"
  context: |
    V4-5 implements consistency-only invariants for KPU mappers (which
    have no commercially-available silicon). The first run surfaced
    that predicted average power exceeds TDP by ~1.5x-3x on every KPU
    mapper -- the same family of bug as #71 was for CPU, but the KPU
    energy model hasn't been calibrated against simulator output yet.
    The question was: how should the V4-5 invariant suite handle a
    known-violated check?

# ============================================================================
# ALTERNATIVES CONSIDERED
# ============================================================================
alternatives:
  - option: "Drop the check entirely until KPU energy is calibrated"
    pros:
      - "All V4-5 tests pass cleanly, no xfail noise."
      - "Simpler to reason about: every test is a hard pass."
    cons:
      - "Loses the institutional memory that this *should* be a check; a future contributor wouldn't know to re-add it after #81 lands."
      - "No CI signal when the energy model gets fixed."
    selected: false
    rejected_reason: "The check IS valuable; it's the constants that are wrong, not the invariant. Dropping it discards the diagnostic."

  - option: "Loosen the threshold so the check passes (e.g., tdp_slack=5.0)"
    pros:
      - "Test passes today without ceremony."
      - "Still surfaces *truly* outlandish power predictions in the future."
    cons:
      - "Silently masks the real bug. A 5x slack is no slack at all -- it would let the energy model drift further before anyone noticed."
      - "Encodes 'predicted power can exceed TDP by 5x' as the contract, which is physically false."
    selected: false
    rejected_reason: "Pretending a violated invariant is satisfied is the V3 anti-pattern that V4 was built to prevent. Same critique as 'self-validation' in the v4 plan."

  - option: "pytest.mark.xfail(strict=True) with a tracking-issue link in the reason"
    pros:
      - "Test runs and reports the violation in CI output (visible diagnostic)."
      - "strict=True means if the underlying bug gets fixed, the test flips to a regular pass and CI signals 'remove the xfail marker'. Self-cleaning."
      - "The reason field documents WHY the test is xfailing and where to track the fix (#81), so a future contributor can resolve it without spelunking."
      - "Mirrors the same pattern used for #71 floor tests and the FX/symbolic_trace tracker tests."
    cons:
      - "Adds an xfail to the suite that will surface in any test summary."
      - "Requires filing the tracking issue (#81) before merging the test."
    selected: true
    selected_reason: "xfail+strict+tracking-issue is the only option that preserves the signal AND auto-cleans when the bug is fixed AND honestly represents the current state. The cost (one xfail line in test output, one filed issue) is negligible against the diagnostic value."

