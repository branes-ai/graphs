# Decision: Defer PowerMeter and CI hook from Phase 0 to Phase 0.5
decision_id: "DECISION-2026-04-16-002"
timestamp: "2026-04-16T00:00:00Z"
ai_model: "claude-opus-4-6-20260101"
session_id: ""

summary: |
  Phase 0 items 5 (PowerMeter abstraction) and 6 (CI hook for
  composition tests) are split into a dedicated Phase 0.5
  (TASK-2026-014) rather than landing alongside the pure-software
  foundation (TASK-2026-013). Phase 0 stays additive and
  hardware-agnostic; Phase 0.5 is the hardware-dependent follow-up
  that Phase 1 depends on.

trigger:
  type: "user_request"
  content: |
    During Phase 0 planning the user asked: "The plan has Phase 0
    (foundation) before any measurement work. ... Do you want me to
    do all six in Phase 0, or land 1-4 first and defer 5-6 to just
    before Phase 1 when we actually need them?"
    The user answered: "yes, execute Phase 0 items 1-4 in a focused
    PR, and get that to a high quality first."
  context: |
    Items 1-4 (LayerTag, fitters subpackage, field_provenance,
    composition scaffold) are pure software and can be validated on
    any host. Items 5-6 require:
      - a specific target host (Intel i7-12700K for RAPL vs.
        Jetson Orin Nano/AGX for tegrastats)
      - possibly optional dependencies (pynvml for NVML)
      - CI runner configuration (which lacks power domains by default)
    Bundling them into Phase 0 would have forced Phase 0 review to
    also review hardware-specific measurement code.

alternatives:
  - option: "Land all six Phase 0 items in one PR"
    pros:
      - "Plan says Phase 0 is one phase; splitting feels like scope creep"
      - "Fewer PRs to merge before Phase 1 can start"
    cons:
      - "PR review has to reason about both API surface and hardware plumbing at once"
      - "PowerMeter needs target-host selection (RAPL vs tegrastats) which was still open at Phase 0 start"
      - "CI hook needs a composition check to gate on, and Phase 0 ships an empty registry"
      - "Higher risk of merge conflicts or hardware-specific bugs blocking the pure-software foundation"
    selected: false
    rejected_reason: "Mixes two concerns; delays the pure-software foundation; creates a larger review surface for no Phase 1 benefit"

  - option: "Split into Phase 0 (items 1-4, pure software) and Phase 0.5 (items 5-6, hardware plumbing)"
    pros:
      - "Phase 0 review focuses on API surface and back-compat"
      - "Phase 0.5 can select target host and pin optional dependencies at the right time"
      - "Phase 0.5 lands just-in-time for Phase 1's first PowerMeter-dependent benchmark"
      - "CI hook has a live registry (from Phase 0) to gate on by the time it lands"
    cons:
      - "Two PRs instead of one"
      - "Introduces a sub-numbered phase ('Phase 0.5') not in the original plan text"
    selected: true
    selected_reason: |
      Matches the user's stated preference ("focused PR, high
      quality"), isolates risk, and aligns each phase with the
      hardware access required to execute it.

