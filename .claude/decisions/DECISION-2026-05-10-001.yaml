# ============================================================================
# RISK ASSESSMENT
# ============================================================================
risks:
  - risk: "Per-channel PHY area heuristic (`_PER_CHANNEL_PHY_AREA_MM2`) is uncalibrated; real PDK numbers may differ by 2-3x"
    mitigation: "Stage 8c calibration against measured silicon. The lookup table is centralized so calibration is a single-file edit. Validator thresholds set high (WARN-max, never ERROR for current SKUs) so uncalibrated heuristic doesn't fail CI."
    severity: "low"
    likelihood: "high"
  - risk: "Two views diverge in subtle ways over time (e.g., one gets a bug fix the other doesn't)"
    mitigation: "Shared `_classify_silicon_bin_blocks` helper does the silicon_bin -> per-tile-area math once; per-view code only diverges in layout + glyph + summary. Tests parametrize over the catalog and exercise both views, catching divergence."
    severity: "medium"
    likelihood: "low"
  - risk: "Architectural view glyphs (C/M/D/:/*) make every compute tile look identical -- user can't visually distinguish INT8 from BF16 from Matrix"
    mitigation: "Per-class area summary table prints alongside the ASCII; class differences surface there. SVG/HTML renderer (Stage 8c) can colour-code by class without symbol pressure."
    severity: "low"
    likelihood: "medium"
  - risk: "Floor-consistent rasterizer rounding (vs round-half-up) chosen for tile uniformity may produce 1-pixel gaps or overlaps for non-tile-aligned blocks at unfortunate canvas widths"
    mitigation: "Min-1-cell rule ensures no block ever collapses to zero. ASCII at width=80 verified across all 4 SKUs; SVG renderer (Stage 8c) won't have this rasterization concern."
    severity: "low"
    likelihood: "low"

